<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PrecuApp Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --apple-blue: #007AFF; --apple-green: #34C759; --apple-bg: #F2F2F7; --apple-card: rgba(255, 255, 255, 0.8); }
        * { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        body { background-color: var(--apple-bg); color: #000; transition: background-color 0.4s; overflow-x: hidden; }
        body.dark-mode { --apple-bg: #000000; --apple-card: rgba(28, 28, 30, 0.8); color: #FFFFFF; }
        .glass { backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%); background-color: var(--apple-card); }
        .squicle { border-radius: 22px; }
        .progress-ring { transition: stroke-dashoffset 1s ease-in-out; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .bottom-sheet { transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1); transform: translateY(105%); }
        .bottom-sheet.active { transform: translateY(0); }
        .apple-btn-active:active { transform: scale(0.96); opacity: 0.7; }
        .ios-input { width: 100%; background: rgba(0,0,0,0.05); border-radius: 12px; padding: 14px; outline: none; border: none; font-size: 17px; }
        .dark-mode .ios-input { background: rgba(255,255,255,0.1); color: white; }
        .collage-grid { display: grid; gap: 4px; border-radius: 18px; overflow: hidden; width: 100%; height: 280px; }
        .collage-img { width: 100%; height: 100%; object-fit: cover; background: #eee; cursor: pointer; }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-areas: "a b" "a c"; grid-template-columns: 1.5fr 1fr; }
        .grid-3 :nth-child(1) { grid-area: a; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-5 { grid-template-areas: "a a b" "a a c" "d e b"; grid-template-columns: 1fr 1fr 1fr; }
        .grid-5 :nth-child(1) { grid-area: a; }
        #imageViewer { transition: opacity 0.3s; display: none; opacity: 0; background: rgba(0,0,0,0.9); z-index: 3000; position: fixed; inset: 0; align-items: center; justify-content: center; padding: 20px; }
        #imageViewer.active { display: flex; opacity: 1; }
        .detail-pill { background: rgba(0,122,255,0.1); color: var(--apple-blue); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
        #fabMenu.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
    </style>
</head>
<body class="select-none">

    <header class="sticky top-0 z-40 glass px-6 pt-12 pb-4 border-b border-black/5 dark:border-white/5">
        <p class="text-[12px] font-bold text-blue-500 uppercase mb-1"></p>
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-extrabold tracking-tight">Tu Actividad</h1>
            <button onclick="toggleSheet('settingsSheet')" class="text-blue-500 p-2 apple-btn-active">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-8 pb-32">
        <section class="grid grid-cols-2 gap-4">
            <div class="glass squicle p-6 flex flex-col items-center border border-white/20">
                <div class="relative mb-2">
                    <svg class="w-24 h-24">
                        <circle class="opacity-10" stroke-width="9" stroke="currentColor" fill="transparent" r="42" cx="48" cy="48" style="color: var(--apple-blue)"/>
                        <circle id="monthRing" class="progress-ring" stroke-width="9" stroke-linecap="round" stroke="currentColor" fill="transparent" r="42" cx="48" cy="48" stroke-dasharray="263.9" stroke-dashoffset="263.9" style="color: var(--apple-blue)"/>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center font-bold text-xl" id="labelMonth">0</div>
                </div>
                <p class="text-[11px] font-bold opacity-50 uppercase">Este Mes</p>
            </div>
            <div class="glass squicle p-6 flex flex-col items-center border border-white/20">
                <div class="relative mb-2">
                    <svg class="w-24 h-24">
                        <circle class="opacity-10" stroke-width="9" stroke="currentColor" fill="transparent" r="42" cx="48" cy="48" style="color: var(--apple-green)"/>
                        <circle id="yearRing" class="progress-ring" stroke-width="9" stroke-linecap="round" stroke="currentColor" fill="transparent" r="42" cx="48" cy="48" stroke-dasharray="263.9" stroke-dashoffset="263.9" style="color: var(--apple-green)"/>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center font-bold text-xl" id="labelYear">0</div>
                </div>
                <p class="text-[11px] font-bold opacity-50 uppercase">Año Total</p>
            </div>
        </section>
        <div id="activitiesList" class="space-y-3"></div>
    </main>

    <div id="fabOverlay" onclick="toggleFab()" class="fixed inset-0 bg-black/10 backdrop-blur-[2px] hidden z-[60]"></div>
    <div class="fixed bottom-8 right-6 z-[70] flex flex-col items-end gap-3">
        <div id="fabMenu" class="flex flex-col items-end gap-3 mb-2 pointer-events-none opacity-0 translate-y-4 transition-all duration-300">
            <button onclick="toggleFab(); toggleSheet('monthSheet')" class="glass px-5 py-3 rounded-full shadow-xl text-blue-500 apple-btn-active font-bold text-[14px] border border-white/20">Añadir a Mes</button>
            <button onclick="toggleFab(); openActivitySheet()" class="glass px-5 py-3 rounded-full shadow-xl text-blue-500 apple-btn-active font-bold text-[14px] border border-white/20">Nueva Actividad</button>
        </div>
        <button id="mainFab" onclick="toggleFab()" class="bg-blue-500 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-2xl apple-btn-active">
            <svg id="fabIcon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="transition-transform duration-300"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <div id="imageViewer" onclick="_closeViewerUI()">
        <button onclick="event.stopPropagation(); _closeViewerUI();" class="absolute top-12 right-6 z-[3100] text-white bg-white/20 w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-md">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <img id="fullImage" class="max-w-full max-h-[85vh] rounded-lg shadow-2xl object-contain" onclick="event.stopPropagation()">
    </div>

    <div id="detailSheetOverlay" onclick="closeSheetDirectly('detailSheet')" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[80]"></div>
    <div id="detailSheet" class="fixed bottom-0 left-0 right-0 glass rounded-t-[30px] z-[90] bottom-sheet max-h-[92vh] overflow-y-auto">
        <div class="w-10 h-1 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto my-3"></div>
        <div class="px-6 pb-12 space-y-5">
            <div class="flex justify-between items-center"><h3 id="detailSheetTitle" class="text-2xl font-bold">Detalle</h3><button id="editToggleBtn" onclick="toggleEditMode()" class="text-blue-500 font-bold">Editar</button></div>
            <div id="detailViewMode" class="space-y-4">
                <div id="detailCollageWrap"></div>
                <div class="flex items-center gap-3"><span id="detailCategory" class="detail-pill"></span><span id="detailDate" class="text-[13px] opacity-40 font-medium"></span></div>
                <div class="flex items-end gap-2"><span id="detailHours" class="text-6xl font-black text-blue-500"></span><span class="text-xl font-bold opacity-30 mb-2">horas</span></div>
                <button onclick="deleteFromDetail()" class="w-full py-4 text-red-500 font-bold bg-red-500/5 rounded-xl border border-red-500/10 apple-btn-active">Eliminar Registro</button>
            </div>
            <div id="detailEditMode" class="space-y-4 hidden">
                <form id="editForm" class="space-y-4">
                    <input type="text" id="editTitle" required class="ios-input" placeholder="Nombre">
                    <div class="flex gap-3"><input type="date" id="editDate" required class="ios-input flex-1"><input type="number" id="editHours" step="0.5" required class="ios-input w-24"></div>
                    <select id="editCategory" class="ios-input text-blue-500 font-bold">
                        <option value="Casa en Casa">Casa en Casa</option><option value="Carritos">Carritos</option><option value="Pública">Pública</option><option value="Informal">Informal</option><option value="Telefónica">Telefónica</option><option value="Curso Bíblico">Curso Bíblico</option>
                    </select>
                    <label class="flex items-center justify-center w-full bg-blue-500/10 p-4 rounded-xl text-blue-500 font-bold cursor-pointer apple-btn-active">
                        <input type="file" id="editImageFile" accept="image/*" multiple class="hidden" onchange="handleFileSelect(this, true)">
                        <span id="editFileNameDisplay">Cambiar Fotos</span>
                    </label>
                    <button type="submit" class="w-full py-4 bg-blue-500 text-white font-bold rounded-xl apple-btn-active">Guardar Cambios</button>
                </form>
            </div>
        </div>
    </div>

    <div id="activitySheetOverlay" onclick="closeSheetDirectly('activitySheet')" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[80]"></div>
    <div id="activitySheet" class="fixed bottom-0 left-0 right-0 glass rounded-t-[30px] z-[90] bottom-sheet max-h-[92vh] overflow-y-auto">
        <div class="w-10 h-1 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto my-3"></div>
        <div class="px-6 pb-12 space-y-6">
            <h3 class="text-2xl font-bold">Nueva Actividad</h3>
            <form id="activityForm" class="space-y-4">
                <input type="text" id="title" required placeholder="Nombre de actividad" class="ios-input">
                <div class="flex gap-3"><input type="date" id="date" required class="ios-input flex-1"><input type="number" id="hours" step="0.5" required placeholder="Hrs" class="ios-input w-24"></div>
                <select id="category" class="ios-input text-blue-500 font-bold">
                    <option value="Casa en Casa">Casa en Casa</option><option value="Carritos">Carritos</option><option value="Pública">Pública</option><option value="Informal">Informal</option><option value="Telefónica">Telefónica</option><option value="Curso Bíblico">Curso Bíblico</option>
                </select>
                <label class="flex items-center justify-center w-full bg-blue-500/10 p-4 rounded-xl text-blue-500 font-bold cursor-pointer apple-btn-active">
                    <input type="file" id="imageFile" accept="image/*" multiple class="hidden" onchange="handleFileSelect(this, false)">
                    <span id="fileNameDisplay">Añadir Fotos (Max 5)</span>
                </label>
                <button type="submit" class="w-full py-4 bg-blue-500 text-white font-bold rounded-xl apple-btn-active">Guardar</button>
            </form>
        </div>
    </div>

    <div id="monthSheetOverlay" onclick="closeSheetDirectly('monthSheet')" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[80]"></div>
    <div id="monthSheet" class="fixed bottom-0 left-0 right-0 glass rounded-t-[30px] z-[90] bottom-sheet p-6 pb-12">
        <div class="w-10 h-1 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto my-3"></div>
        <h3 class="text-2xl font-bold mb-4">Mes Completo</h3>
        <form id="monthForm" class="space-y-4">
            <select id="monthSelect" required class="ios-input font-bold">
                <option value="">Selecciona Mes</option>
                <option value="2025-09">Septiembre 2025</option><option value="2025-10">Octubre 2025</option><option value="2025-11">Noviembre 2025</option><option value="2025-12">Diciembre 2025</option>
                <option value="2026-01">Enero 2026</option><option value="2026-02">Febrero 2026</option><option value="2026-03">Marzo 2026</option><option value="2026-04">Abril 2026</option><option value="2026-05">Mayo 2026</option><option value="2026-06">Junio 2026</option><option value="2026-07">Julio 2026</option><option value="2026-08">Agosto 2026</option><option value="2026-09">Septiembre 2026</option>
            </select>
            <input type="number" id="monthHours" step="0.5" required placeholder="Total horas" class="ios-input">
            <button type="submit" class="w-full py-4 bg-green-500 text-white font-bold rounded-xl apple-btn-active">Registrar Mes</button>
        </form>
    </div>

    <div id="settingsSheetOverlay" onclick="closeSheetDirectly('settingsSheet')" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[80]"></div>
    <div id="settingsSheet" class="fixed bottom-0 left-0 right-0 glass rounded-t-[30px] z-[90] bottom-sheet p-6 pb-12">
        <div class="w-10 h-1 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto my-3"></div>
        <h3 class="text-2xl font-bold mb-6">Ajustes</h3>
        <div class="bg-black/5 dark:bg-white/5 rounded-2xl overflow-hidden">
            <div class="flex justify-between items-center p-5 border-b border-black/5 dark:border-white/5">
                <span class="font-bold">Modo Oscuro</span>
                <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()" class="w-12 h-6 bg-gray-300 rounded-full appearance-none checked:bg-green-500 transition-all relative after:absolute after:w-5 after:h-5 after:bg-white after:rounded-full after:top-0.5 after:left-0.5 checked:after:left-6 after:transition-all">
            </div>
            <button onclick="clearData()" class="w-full p-5 text-red-500 font-bold text-left">Borrar todo el historial</button>
        </div>
    </div>

    <script>
    let activities = JSON.parse(localStorage.getItem('precursor_activities')) || [];
    let monthlyEntries = JSON.parse(localStorage.getItem('monthly_entries')) || [];
    let tempImages = [];
    let currentDetailId = null;
    let isEditMode = false;
    let isFabOpen = false;
    let activeSheet = null;

    function migrate() {
        let changed = false;
        activities = activities.map(act => {
            if (act.image && (!act.images || act.images.length === 0)) {
                act.images = [act.image]; changed = true;
            }
            return act;
        });
        if (changed) localStorage.setItem('precursor_activities', JSON.stringify(activities));
    }
    migrate();

    // ── Visor de imágenes ──────────────────────────────────────────────
    function openViewer(src) {
        document.getElementById('fullImage').src = src;
        const v = document.getElementById('imageViewer');
        v.style.display = 'flex';
        setTimeout(() => { v.style.opacity = '1'; v.classList.add('active'); }, 10);
    }
    function _closeViewerUI() {
        const v = document.getElementById('imageViewer');
        v.style.opacity = '0';
        setTimeout(() => { v.style.display = 'none'; v.classList.remove('active'); }, 300);
    }

    // ── Sheets: abrir / cerrar directo (sin history API) ──────────────
    function openSheet(id) {
        closeAllSheets();
        document.getElementById(id).classList.add('active');
        document.getElementById(id + 'Overlay').classList.remove('hidden');
        activeSheet = id;
    }

    function closeSheetDirectly(id) {
        document.getElementById(id).classList.remove('active');
        document.getElementById(id + 'Overlay').classList.add('hidden');
        if (activeSheet === id) activeSheet = null;
        if (id === 'detailSheet') { currentDetailId = null; isEditMode = false; }
    }

    function closeAllSheets() {
        ['activitySheet', 'monthSheet', 'detailSheet', 'settingsSheet'].forEach(id => {
            document.getElementById(id).classList.remove('active');
            document.getElementById(id + 'Overlay').classList.add('hidden');
        });
        activeSheet = null;
    }

    // Mantener toggleSheet para el botón de settings (por compatibilidad)
    function toggleSheet(id) {
        const s = document.getElementById(id);
        if (s.classList.contains('active')) closeSheetDirectly(id);
        else openSheet(id);
    }

    // ── FAB ───────────────────────────────────────────────────────────
    function toggleFab() {
        const menu = document.getElementById('fabMenu');
        const icon = document.getElementById('fabIcon');
        const overlay = document.getElementById('fabOverlay');
        isFabOpen = !isFabOpen;
        if (isFabOpen) {
            menu.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            menu.classList.add('active');
            overlay.classList.remove('hidden');
            icon.style.transform = 'rotate(135deg)';
        } else {
            menu.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            menu.classList.remove('active');
            overlay.classList.add('hidden');
            icon.style.transform = 'rotate(0deg)';
        }
    }

    // ── Imágenes ──────────────────────────────────────────────────────
    async function handleFileSelect(input, isEdit) {
        const files = Array.from(input.files).slice(0, 5);
        const label = document.getElementById(isEdit ? 'editFileNameDisplay' : 'fileNameDisplay');
        if (files.length === 0) return;
        label.innerText = "Cargando...";
        tempImages = [];
        for (const file of files) {
            const b64 = await compressImage(file);
            tempImages.push(b64);
        }
        label.innerText = `¡${tempImages.length} fotos listas!`;
    }

    function compressImage(file) {
        return new Promise((res) => {
            const r = new FileReader();
            r.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 800;
                    let w = img.width, h = img.height;
                    if (w > MAX) { h *= MAX / w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
            r.readAsDataURL(file);
        });
    }

    function createCollageHTML(images) {
        if (!images || images.length === 0) return `<div class="w-full h-32 bg-blue-500/5 rounded-2xl flex items-center justify-center opacity-20"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>`;
        const n = Math.min(images.length, 5);
        return `<div class="collage-grid grid-${n}">${images.slice(0, n).map(src => `<img src="${src}" class="collage-img" onclick="openViewer('${src}')">`).join('')}</div>`;
    }

    // ── Abrir sheets ──────────────────────────────────────────────────
    function openActivitySheet() {
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        tempImages = [];
        document.getElementById('fileNameDisplay').innerText = "Añadir Fotos (Max 5)";
        document.getElementById('activityForm').reset();
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        openSheet('activitySheet');
    }

    function openDetailSheet(id) {
        const act = activities.find(a => a.id === id);
        if (!act) return;
        currentDetailId = id;
        isEditMode = false;
        document.getElementById('detailSheetTitle').innerText = act.title;
        document.getElementById('detailHours').innerText = act.hours;
        document.getElementById('detailCategory').innerText = act.category;
        document.getElementById('detailDate').innerText = new Date(act.date + 'T12:00:00').toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('detailCollageWrap').innerHTML = createCollageHTML(act.images || []);
        document.getElementById('detailViewMode').classList.remove('hidden');
        document.getElementById('detailEditMode').classList.add('hidden');
        document.getElementById('editToggleBtn').innerText = 'Editar';
        openSheet('detailSheet');
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        const act = activities.find(a => a.id === currentDetailId);
        if (isEditMode) {
            document.getElementById('editTitle').value = act.title;
            document.getElementById('editDate').value = act.date;
            document.getElementById('editHours').value = act.hours;
            document.getElementById('editCategory').value = act.category;
            tempImages = act.images ? [...act.images] : [];
            document.getElementById('editFileNameDisplay').innerText = `Mantener ${tempImages.length} fotos`;
            document.getElementById('detailViewMode').classList.add('hidden');
            document.getElementById('detailEditMode').classList.remove('hidden');
            document.getElementById('editToggleBtn').innerText = 'Cancelar';
        } else {
            document.getElementById('detailViewMode').classList.remove('hidden');
            document.getElementById('detailEditMode').classList.add('hidden');
            document.getElementById('editToggleBtn').innerText = 'Editar';
        }
    }

    // ── Guardar (sin history.back) ─────────────────────────────────────
    function saveAndReload(formId) {
        localStorage.setItem('precursor_activities', JSON.stringify(activities));
        localStorage.setItem('monthly_entries', JSON.stringify(monthlyEntries));

        if (formId) {
            const form = document.getElementById(formId);
            if (form) form.reset();
        }

        tempImages = [];
        closeAllSheets();
        updateDashboard();
    }

    // ── Formularios ───────────────────────────────────────────────────
    document.getElementById('activityForm').onsubmit = (e) => {
        e.preventDefault();
        activities.push({
            id: Date.now().toString(),
            title: document.getElementById('title').value,
            date: document.getElementById('date').value,
            hours: parseFloat(document.getElementById('hours').value),
            category: document.getElementById('category').value,
            images: [...tempImages]
        });
        saveAndReload('activityForm');
    };

    document.getElementById('editForm').onsubmit = (e) => {
        e.preventDefault();
        const idx = activities.findIndex(a => a.id === currentDetailId);
        if (idx !== -1) {
            activities[idx] = {
                ...activities[idx],
                title: document.getElementById('editTitle').value,
                date: document.getElementById('editDate').value,
                hours: parseFloat(document.getElementById('editHours').value),
                category: document.getElementById('editCategory').value,
                images: tempImages.length > 0 ? [...tempImages] : (activities[idx].images || [])
            };
        }
        saveAndReload('editForm');
    };

    document.getElementById('monthForm').onsubmit = (e) => {
        e.preventDefault();
        monthlyEntries.push({
            id: Date.now().toString(),
            month: document.getElementById('monthSelect').value,
            hours: parseFloat(document.getElementById('monthHours').value)
        });
        saveAndReload('monthForm');
    };

    function deleteFromDetail() {
        if (confirm('¿Eliminar este registro?')) {
            activities = activities.filter(a => a.id !== currentDetailId);
            saveAndReload(null);
        }
    }

    // ── Dashboard ─────────────────────────────────────────────────────
    function updateDashboard() {
        const now = new Date(), curM = now.getMonth(), curY = now.getFullYear();
        const totalMonth = activities.reduce((sum, a) => {
            const d = new Date(a.date + 'T12:00:00');
            return (d.getMonth() === curM && d.getFullYear() === curY) ? sum + parseFloat(a.hours) : sum;
        }, 0);
        const totalYear = activities.reduce((sum, a) => sum + parseFloat(a.hours), 0)
            + monthlyEntries.reduce((sum, m) => sum + parseFloat(m.hours), 0);

        document.getElementById('labelMonth').innerText = totalMonth;
        document.getElementById('labelYear').innerText = Math.round(totalYear);

        const upRing = (id, cur, goal) => {
            const r = document.getElementById(id), circ = 263.9;
            r.style.strokeDashoffset = circ - (Math.min(cur / goal, 1) * circ);
        };
        upRing('monthRing', totalMonth, 50);
        upRing('yearRing', totalYear, 600);
        renderActivities();
    }

    function renderActivities() {
        const list = document.getElementById('activitiesList');
        if (activities.length === 0) {
            list.innerHTML = `<div class="p-10 text-center opacity-30 font-bold">Sin registros</div>`;
            return;
        }
        const sorted = [...activities].sort((a, b) => new Date(b.date) - new Date(a.date));
        list.innerHTML = sorted.map(act => `
            <div onclick="openDetailSheet('${act.id}')" class="glass squicle p-4 flex gap-4 items-center border border-white/10 apple-btn-active cursor-pointer">
                ${act.images && act.images[0]
                    ? `<img src="${act.images[0]}" class="w-14 h-14 rounded-xl object-cover">`
                    : `<div class="w-14 h-14 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-500 font-bold">${act.hours}</div>`}
                <div class="flex-1 min-w-0">
                    <p class="text-[10px] font-bold text-blue-500 uppercase">${act.category}</p>
                    <h3 class="font-bold truncate">${act.title}</h3>
                    <p class="text-[12px] opacity-40">${new Date(act.date + 'T12:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'short' })}</p>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="opacity-20"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </div>`).join('');
    }

    // ── Dark mode ─────────────────────────────────────────────────────
    function toggleDarkMode() {
        const isDark = document.getElementById('darkModeToggle').checked;
        document.body.classList.toggle('dark-mode', isDark);
        localStorage.setItem('dark_mode', isDark);
    }
    if (localStorage.getItem('dark_mode') === 'true') {
        document.body.classList.add('dark-mode');
        document.getElementById('darkModeToggle').checked = true;
    }

    function clearData() {
        if (confirm('¿Borrar todo el historial permanentemente?')) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = updateDashboard;
    </script>
</body>
</html>
